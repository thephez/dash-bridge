<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Dash Core → Platform Bridge</title>
  <!-- CAP widget for proof-of-work challenges -->
  <script src="https://cdn.jsdelivr.net/npm/@cap.js/widget" defer></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 200px 50px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 250px 160px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 300px 90px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 350px 200px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 400px 130px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 450px 60px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 500px 180px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 80px 200px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 150px 250px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 220px 300px, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 320px 280px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 420px 320px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 480px 250px, rgba(255,255,255,0.7), transparent);
      background-size: 550px 400px;
      animation: sparkle 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(1px 1px at 70px 100px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 120px 180px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 180px 60px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 240px 220px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 310px 140px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 380px 40px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 440px 260px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 510px 100px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 60px 320px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 140px 380px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 260px 350px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 360px 400px, rgba(255,255,255,0.6), transparent);
      background-size: 600px 450px;
      animation: sparkle 4s ease-in-out infinite 2s;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    #app {
      width: 100%;
      max-width: 620px;
      position: relative;
      z-index: 1;
    }

    .bridge-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    /* Subtle progress bar at top */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #008de4, #4CAF50);
      transition: width 0.3s ease;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 10px;
      color: #fff;
    }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #555;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .github-link:hover {
      color: #888;
    }

    .github-link svg {
      flex-shrink: 0;
    }

    .network-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .network-badge.testnet {
      background: #ff9800;
      color: #000;
    }

    .network-badge.mainnet {
      background: #008de4;
      color: #fff;
    }

    /* Retry banner */
    .retry-banner {
      background: rgba(255, 152, 0, 0.15);
      border: 1px solid rgba(255, 152, 0, 0.3);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .retry-icon {
      font-size: 1.2rem;
      animation: spin 1s linear infinite;
    }

    .retry-text {
      color: #ff9800;
      font-size: 0.85rem;
      font-weight: 500;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .content {
      min-height: 200px;
    }

    .init-step {
      text-align: center;
    }

    .init-step p {
      margin-bottom: 16px;
      color: #b0b0b0;
    }

    .primary-btn {
      background: linear-gradient(135deg, #008de4 0%, #0066b3 100%);
      color: white;
      border: none;
      padding: 18px 36px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 141, 228, 0.4);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .deposit-step {
      text-align: center;
    }

    .deposit-headline {
      font-size: 1.3rem;
      color: #fff;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .deposit-headline strong {
      color: #4CAF50;
      font-weight: 600;
    }

    .deposit-reassurance {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .qr-section {
      margin-bottom: 16px;
    }

    .qr-label {
      color: #b0b0b0;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .qr-container {
      background: white;
      padding: 16px;
      border-radius: 14px;
      display: inline-block;
    }

    .qr-container img {
      display: block;
    }

    .address-section {
      margin-bottom: 16px;
    }

    .address-label {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 8px;
    }

    .address-display {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .address {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.9rem;
      word-break: break-all;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #888;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .backup-note {
      color: #888;
      font-size: 0.8rem;
      margin-top: 20px;
    }

    .backup-check {
      color: #4CAF50;
      font-weight: 600;
      margin-right: 4px;
    }

    .processing-step {
      text-align: center;
      padding: 20px 0;
    }

    .processing-headline {
      color: #fff;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .processing-subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .processing-status {
      color: #008de4;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .processing-details {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 20px;
      text-align: left;
    }

    .processing-details .detail-row {
      padding: 10px 0;
    }

    .processing-details .detail-row:not(:last-child) {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .processing-details label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .processing-details .txid {
      font-size: 0.8rem;
      word-break: break-all;
      color: #b0b0b0;
    }

    .processing-details .amount {
      font-size: 1rem;
      color: #fff;
      font-weight: 500;
    }

    .spinner {
      color: #888;
      font-size: 0.9rem;
    }

    .spinner.large::before {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #008de4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .complete-step {
      text-align: center;
    }

    .complete-headline {
      color: #fff;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .complete-subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .backup-section {
      margin-bottom: 24px;
    }

    .backup-section .primary-btn {
      width: 100%;
      margin-bottom: 12px;
    }

    .backup-warning {
      color: #888;
      font-size: 0.8rem;
      margin: 0;
    }

    .identity-info {
      background: rgba(0, 0, 0, 0.2);
      padding: 20px;
      border-radius: 10px;
    }

    .identity-info label {
      display: block;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 8px;
    }

    .identity-id {
      display: block;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.95rem;
      word-break: break-all;
      color: #b0b0b0;
    }

    .error-step {
      text-align: center;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .error-step h2 {
      color: #f44336;
      margin-bottom: 8px;
    }

    .error-code-badge {
      display: inline-block;
      background: rgba(244, 67, 54, 0.15);
      color: #f44336;
      font-family: monospace;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .error-label {
      font-size: 1rem;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 4px;
    }

    .error-failed-step {
      font-size: 0.85rem;
      color: #9e9e9e;
      margin-bottom: 16px;
    }

    .error-message {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      word-break: break-word;
      text-align: left;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-technical {
      margin-bottom: 20px;
      text-align: left;
    }

    .error-technical summary {
      cursor: pointer;
      font-size: 0.8rem;
      color: #9e9e9e;
      margin-bottom: 8px;
      user-select: none;
    }

    .error-technical summary:hover {
      color: #e0e0e0;
    }

    .error-technical-content {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      color: #bdbdbd;
    }

    /* Key configuration styles */
    .keys-section {
      text-align: left;
      margin-bottom: 24px;
    }

    .keys-section h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #fff;
    }

    .keys-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .key-row {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 14px;
      border-radius: 10px;
      gap: 10px;
    }

    .key-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #e0e0e0;
      width: 80px;
      flex-shrink: 0;
    }

    .key-config {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .key-config select {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e0e0e0;
      padding: 8px 6px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .key-config select:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .key-config select:focus {
      outline: none;
      border-color: #008de4;
    }

    .key-config .key-purpose-select {
      min-width: 155px;
    }

    .remove-key-btn {
      background: rgba(244, 67, 54, 0.2);
      border: none;
      color: #f44336;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .remove-key-btn:hover:not(:disabled) {
      background: rgba(244, 67, 54, 0.4);
    }

    .remove-key-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .add-key-btn {
      width: 100%;
      background: transparent;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      color: #888;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-key-btn:hover {
      border-color: #008de4;
      color: #008de4;
      background: rgba(0, 141, 228, 0.1);
    }

    .intro {
      margin-bottom: 20px;
    }

    /* Network selector */
    .network-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .network-btn {
      flex: 1;
      max-width: 140px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.05);
      color: #888;
    }

    .network-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .network-btn.testnet.active {
      background: rgba(255, 152, 0, 0.15);
      border-color: #ff9800;
      color: #ff9800;
    }

    .network-btn.mainnet.active {
      background: rgba(0, 141, 228, 0.15);
      border-color: #008de4;
      color: #008de4;
    }

    .network-btn.devnet.active {
      background: rgba(156, 39, 176, 0.15);
      border-color: #9c27b0;
      color: #9c27b0;
    }

    .devnet-dropdown {
      position: relative;
      flex: 1;
      max-width: 160px;
    }

    .devnet-dropdown .network-btn {
      width: 100%;
      max-width: none;
    }

    .devnet-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 6px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .devnet-option {
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: #ccc;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .devnet-option:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .devnet-option.active {
      background: rgba(156, 39, 176, 0.15);
      color: #9c27b0;
    }

    .devnet-option.custom {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin-top: 4px;
      padding-top: 12px;
    }

    .network-badge.devnet {
      background: rgba(156, 39, 176, 0.15);
      color: #9c27b0;
    }

    /* Custom devnet modal */
    .devnet-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .devnet-modal {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 28px;
      max-width: 520px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .devnet-modal h2 {
      margin-top: 0;
      color: #fff;
    }

    .devnet-modal label {
      display: block;
      margin-top: 14px;
      font-weight: 500;
      color: #ccc;
      font-size: 0.9rem;
    }

    .devnet-modal input,
    .devnet-modal textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .devnet-modal textarea {
      font-family: monospace;
      min-height: 80px;
      resize: vertical;
    }

    .devnet-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      justify-content: flex-end;
    }

    .devnet-modal-actions .primary-btn,
    .devnet-modal-actions .secondary-btn {
      padding: 10px 20px;
      font-size: 0.95rem;
    }

    /* Configure keys step */
    .configure-keys-step {
      text-align: left;
    }

    .keys-reassurance {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.2);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .keys-reassurance-text {
      color: #4CAF50;
      font-size: 0.95rem;
      margin: 0;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    .nav-buttons .primary-btn,
    .nav-buttons .secondary-btn {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    /* Recheck section (after timeout) */
    .recheck-section {
      text-align: center;
      margin-top: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .recheck-section p {
      color: #888;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    /* Insufficient deposit styling */
    .recheck-section.insufficient {
      background: rgba(255, 152, 0, 0.1);
      border-color: rgba(255, 152, 0, 0.3);
    }

    .recheck-section .insufficient-title {
      color: #ff9800;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .recheck-section .insufficient-msg {
      color: #b0b0b0;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

      border: 1px solid rgba(255, 152, 0, 0.25);
      border-radius: 10px;

    /* Hero faucet section for testnet */
    .faucet-section.faucet-hero {
      margin-top: 24px;
      margin-bottom: 24px;
      padding: 24px;

      margin-bottom: 14px;

    .faucet-btn {

      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .faucet-btn.faucet-btn-hero {
      padding: 18px 36px;
      font-size: 1.1rem;
      border-radius: 10px;
    }

    .faucet-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);

    .faucet-btn:disabled {
      opacity: 0.6;

      transform: none;
      box-shadow: none;

    .faucet-loading {
      display: flex;

      justify-content: center;

      color: #ff9800;

    .faucet-spinner {

    .faucet-success {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #4CAF50;
      font-size: 0.95rem;

    .faucet-checkmark {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .faucet-txid {
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #b0b0b0;
      margin-left: 4px;
    }

    .faucet-error {
      color: #f44336;
      font-size: 0.85rem;
      margin-top: 10px;
      margin-bottom: 0;

    /* Deposit method section (collapsible on testnet) */
    .deposit-method-section {
      margin-top: 16px;
    }

    .deposit-method-section.collapsible {
      margin-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 20px;
    }

    .deposit-method-toggle {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #888;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .deposit-method-toggle:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.25);
      color: #b0b0b0;
    }

    .deposit-method-toggle .toggle-icon {
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .deposit-method-toggle.expanded .toggle-icon {
      transform: rotate(180deg);
    }

    .deposit-method-content {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
      max-height: 1000px;
      opacity: 1;
    }

    .deposit-method-content.collapsed {
      max-height: 0;
      opacity: 0;
      padding: 0;
    }

    .deposit-method-section.collapsible .deposit-method-content:not(.collapsed) {
      padding-top: 20px;
    }

    .contract-textarea {

      text-transform: uppercase;

    .fee-table {
      width: 100%;

    .fee-table th {
